services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telehealthpro
    ports:
      - "5432:5432"
    volumes:
      - telehealthpro_pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro

volumes:
  telehealthpro_pgdata:
